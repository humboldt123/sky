name: Crypt
version: '${version}'
main: me.bigratenthusiast.crypt.Crypt
api-version: '1.21'
authors: [Vish]
description: Custom plugin for the Crypt KitPvP server

commands:
  rematch:
    description: Reset everything and teleport all players to lobby
    permission: crypt.*
  deathmatch:
    description: Teleport alive players to deathmatch area
    permission: crypt.*
  quickheal:
    description: Apply regen and saturation to a player
    usage: /quickheal <player>
    permission: crypt.*
  killall:
    description: Kill all non-player non-villager non-painting non-item-frame entities
    permission: crypt.*
  resetmap:
    description: Paste schematic and run full reset
    permission: crypt.*
  kits:
    description: Open kit selection GUI
  shop:
    description: Open nearest shop GUI
  crypt:
    description: Admin configuration commands
    permission: crypt.*
  addswitchtonearest:
    description: Add a switch to the nearest interactable
    usage: /addswitchtonearest <switch>
    permission: crypt.*
  removeswitchfromnearest:
    description: Remove a switch from the nearest interactable
    usage: /removeswitchfromnearest <switch>
    permission: crypt.*
  listswitchesonnearest:
    description: List switches on the nearest interactable
    permission: crypt.*

permissions:
  crypt.*:
    description: All crypt admin commands
    default: op
